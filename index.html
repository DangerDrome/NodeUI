<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeUI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128' fill='none'><rect x='24' y='24' width='80' height='56' rx='8' fill='rgba(249,199,79,0.2)' stroke='%23F9C74F' stroke-width='2.5'/><circle cx='64' cy='104' r='6' fill='%23F9C74F'/></svg>">
    <link rel="stylesheet" href="src/styles/styles.css">

    <script src="src/core/markdown.js"></script>

    <script src="src/core/collaboration.js"></script>

    <!-- Core Application -->
    <script src="src/main.js"></script>

</html>
