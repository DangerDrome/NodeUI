<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Node Graph Application</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="grayscale-theme">
    <div id="controls">
        <button id="add-node-btn"><i data-lucide="plus"></i></button>
        <button id="add-group-btn"><i data-lucide="box-select"></i></button>
        <button id="zoom-in-btn"><i data-lucide="zoom-in"></i></button>
        <button id="zoom-out-btn"><i data-lucide="zoom-out"></i></button>
        <button id="theme-toggle-btn"><i data-lucide="sun"></i></button>
        <button id="settings-btn"><i data-lucide="settings"></i></button>
        <select id="edge-type-select">
            <option value="straight">Straight</option>
            <option value="step">Step</option>
            <option value="bezier" selected>Bezier</option>
        </select>
    </div>
    <div id="graph-container">
        <svg id="graph-svg"></svg>
        <div id="selection-box"></div>
    </div>
    <div id="context-menu" class="context-menu">
        <ul>
            <li id="add-node-option"><i data-lucide="box"></i> Add Node</li>
            <li id="add-group-option-context"><i data-lucide="box-select"></i> Add Group</li>
            <li id="toggle-snap-option"><i data-lucide="grid"></i> <span>Toggle Snapping</span></li>
            <li id="toggle-snap-obj-option"><i data-lucide="magnet"></i> <span>Snap to Objects</span></li>
            <li id="group-option"><i data-lucide="group"></i> Group Selection</li>
            <li id="delete-node-option"><i data-lucide="trash-2"></i> Delete Node</li>
            <li id="disable-node-option"><i data-lucide="slash"></i> Disable Node</li>
            <li id="delete-edge-option">Delete Edge</li>
            <li id="add-routing-point-option">Add Routing Point</li>
        </ul>
    </div>
    <div id="info-bar"></div>
    <div id="properties-panel">
        <div class="property">
            <label for="node-name"><i data-lucide="text-cursor-input"></i></label>
            <input type="text" id="node-name">
            <button id="delete-node-btn-prop" class="panel-button"><i data-lucide="trash-2"></i></button>
        </div>
        <div class="property">
            <label><i data-lucide="palette"></i></label>
            <div id="node-color-swatches"></div>
        </div>
    </div>
    <div id="settings-panel">
        <h3>Settings</h3>
        <div class="property">
            <label for="grid-size">Grid Size:</label>
            <input type="number" id="grid-size" min="10" max="100" step="5">
        </div>
        <div class="property">
            <label for="min-zoom">Min Zoom:</label>
            <input type="number" id="min-zoom" min="0.1" max="1" step="0.1">
        </div>
        <div class="property">
            <label for="max-zoom">Max Zoom:</label>
            <input type="number" id="max-zoom" min="1" max="5" step="0.5">
        </div>
        <div class="property">
            <label for="default-node-width">Default Node Width:</label>
            <input type="number" id="default-node-width" min="50" max="300" step="10">
        </div>
        <div class="property">
            <label for="default-node-height">Default Node Height:</label>
            <input type="number" id="default-node-height" min="30" max="200" step="10">
        </div>
        <div class="property">
            <label for="default-group-width">Default Group Width:</label>
            <input type="number" id="default-group-width" min="100" max="500" step="20">
        </div>
        <div class="property">
            <label for="default-group-height">Default Group Height:</label>
            <input type="number" id="default-group-height" min="80" max="400" step="20">
        </div>
        <div class="property">
            <label for="default-properties-width">Properties Panel Width:</label>
            <input type="number" id="default-properties-width" min="200" max="500" step="10" value="300">
        </div>
        <div class="property">
            <label for="connection-zone-radius">Connection Zone Radius:</label>
            <input type="number" id="connection-zone-radius" min="10" max="100" step="5">
        </div>
        <div class="property">
            <label for="edge-stroke-width">Edge Stroke Width:</label>
            <input type="number" id="edge-stroke-width" min="1" max="10" step="0.5">
        </div>
        <button id="close-settings-btn" class="panel-button"><i data-lucide="x"></i></button>
    </div>
    <script>
        lucide.createIcons();
    </script>
    <!-- <script src="script.js"></script> -->
    <script src="nodeui.js"></script>
</body>
</html>
