<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NodeUI Embed</title>
    <link rel="stylesheet" href="src/styles/styles.css">
    <script src="config.js"></script>
    <style>
        /* Override for embed context */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1c1c1c;
        }
        #nodeui-app {
            width: 100%;
            height: 100%;
        }
        #nodeui-canvas-container {
            width: 100%;
            height: 100%;
        }
    </style>
    <script>
        // Pre-load the graph data so the app picks it up on init
        // The app checks window.embeddedGraphData as a fallback
        fetch('graph.json')
            .then(r => r.json())
            .then(data => { window.embeddedGraphData = data; })
            .catch(() => {});
    </script>
</head>
<body>
    <div id="nodeui-app">
        <div id="nodeui-canvas-container" tabindex="0"></div>
        <div id="nodeui-pinned-node-container"></div>
    </div>

    <script src="src/core/libs.js"></script>
    <script src="src/core/version.js"></script>
    <script src="src/core/markdown.js"></script>
    <script src="src/core/collaboration.js"></script>
    <script src="src/main.js"></script>
    <script>
        // After NodeUI initializes, load the graph
        // The DOMContentLoaded in main.js has loadInitialGraph disabled,
        // so we trigger it manually after a short delay
        window.addEventListener('load', () => {
            const waitForEvents = setInterval(() => {
                if (typeof events !== 'undefined' && window.embeddedGraphData) {
                    clearInterval(waitForEvents);
                    events.publish('graph:load-content', JSON.stringify(window.embeddedGraphData));
                }
            }, 100);
            // Safety timeout - stop trying after 5s
            setTimeout(() => clearInterval(waitForEvents), 5000);
        });
    </script>
</body>
</html>
